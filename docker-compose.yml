version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: stockmind_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: stockmind_db
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  backend:
    build: ./backend
    container_name: stockmind_backend
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/stockmind_db?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET: stockmind_super_secret_key_2024_change_in_production
      JWT_EXPIRATION: 86400000
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    depends_on:
      mysql:
        condition: service_healthy

  analytics:
    build: ./analytics
    container_name: stockmind_analytics
    restart: on-failure
    ports:
      - "8000:8000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: stockmind_db
      DB_USER: root
      DB_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy

  gateway:
    build: ./gateway
    container_name: stockmind_gateway
    restart: on-failure
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JAVA_API_URL: http://backend:8080
      PYTHON_API_URL: http://analytics:8000
      JWT_SECRET: stockmind_super_secret_key_2024_change_in_production
      NODE_ENV: development
      GROQ_API_KEY: TU_GROQ_API_KEY_AQUI
    depends_on:
      - backend
      - analytics

  frontend:
    build: ./frontend
    container_name: stockmind_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_GATEWAY_URL: http://localhost:3000
    depends_on:
      - gateway

volumes:
  mysql_data: